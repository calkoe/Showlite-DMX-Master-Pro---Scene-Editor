<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Showlite DMX Master Pro - Scene Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>🎭 Showlite DMX Master Pro - Scene Editor</h1>

      <div class="controls" id="controlsBar" style="display: none">
        <div class="top-controls">
          <div class="action-buttons" id="actionButtons">
            <button onclick="jumpToChannelConfig()">
              ⚙️ Enter Channel Config
            </button>
            <button onclick="jumpToCalibration()">
              📐 Enter Calibration Scenes
            </button>
            <button onclick="clearScene()">🗑️ Clear this Scene</button>
            <button onclick="clearBank()">🗑️ Clear this Bank</button>
            <button onclick="downloadFile()">💾 Download Modified .PRO</button>
            <div
              class="channel-display-control"
              style="
                display: inline-flex;
                align-items: center;
                gap: 4px;
                margin-left: 8px;
              "
            >
              <label for="channelCount" style="font-size: 0.8em; color: #aaa"
                >Channels:</label
              >
              <input
                type="number"
                id="channelCount"
                min="1"
                max="16"
                value="8"
                onchange="updateChannelDisplay(this.value)"
                style="
                  width: 50px;
                  padding: 4px;
                  background: #2a2a2a;
                  color: #e0e0e0;
                  border: 1px solid #4a4a4a;
                  border-radius: 3px;
                "
              />
            </div>
          </div>
        </div>
        <div class="copy-controls" id="copyControls" style="display: none">
          <div class="copy-row">
            <span class="copy-label">🏦 Copy Bank</span>
            <label>From:</label>
            <input
              type="number"
              id="copyFromBank"
              min="1"
              max="30"
              placeholder="Bank #"
            />
            <label>To:</label>
            <input
              type="number"
              id="copyToBank"
              min="1"
              max="30"
              placeholder="Bank #"
            />
            <button onclick="copyBank()">Copy</button>
          </div>
        </div>
      </div>

      <div id="error"></div>

      <div class="scene-display" id="sceneDisplay">
        <div class="empty-scene">
          No scene loaded
          <br /><br />
          <input
            type="file"
            id="fileInput"
            accept=".PRO,.pro"
            style="display: none"
          />
          <button
            onclick="document.getElementById('fileInput').click()"
            style="
              padding: 10px 20px;
              background: #3a3a3a;
              color: #e0e0e0;
              border: 1px solid #4a4a4a;
              border-radius: 4px;
              cursor: pointer;
              font-size: 1em;
              margin-right: 8px;
            "
          >
            📁 Upload Own File
          </button>
          <button
            id="demoBtn"
            onclick="loadDemo()"
            style="
              padding: 10px 20px;
              background: #4a9eff;
              color: white;
              border: none;
              border-radius: 4px;
              cursor: pointer;
              font-size: 1em;
            "
          >
            📂 Load Demo File
          </button>
        </div>
      </div>
    </div>

    <footer
      style="
        text-align: center;
        padding: 16px 0 8px;
        font-size: 0.75em;
        color: #666;
      "
    >
      <a
        href="https://github.com/calkoe/Showlite-DMX-Master-Pro---Scene-Editor"
        target="_blank"
        rel="noopener"
        style="color: #4a9eff; text-decoration: none"
        >GitHub Repository</a
      >
    </footer>

    <script src="constants.js"></script>
    <script src="pro-format.js"></script>
    <script src="color-utils.js"></script>
    <script src="renderer.js"></script>
    <script src="interactions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
