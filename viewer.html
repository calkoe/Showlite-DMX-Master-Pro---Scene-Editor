<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Showlite DMX Master Pro - Scene Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a1a;
        color: #e0e0e0;
        padding: 10px;
      }

      .container {
        max-width: 100%;
        margin: 0;
        padding: 0 20px;
      }

      h1 {
        text-align: center;
        margin-bottom: 10px;
        color: #4a9eff;
        font-size: 1em;
      }

      .controls {
        background: #2a2a2a;
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .file-input {
        margin-bottom: 8px;
      }

      input[type="file"] {
        padding: 10px;
        background: #3a3a3a;
        color: #e0e0e0;
        border: 1px solid #4a4a4a;
        border-radius: 4px;
        cursor: pointer;
      }

      .scene-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        background: #333;
        border-radius: 4px;
      }

      .scene-info h2 {
        color: #4a9eff;
        font-size: 1em;
      }

      .navigation-hint {
        color: #888;
        font-size: 0.75em;
      }

      .scene-display {
        background: #2a2a2a;
        padding: 10px;
        border-radius: 8px;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 4px 6px;
        text-align: center;
        border: 1px solid #3a3a3a;
      }

      th {
        background: #3a3a3a;
        color: #4a9eff;
        font-weight: 600;
        position: sticky;
        top: 0;
      }

      .channel-label {
        background: #333;
        color: #aaa;
        font-weight: 500;
        font-size: 0.9em;
        padding: 4px 2px;
      }

      td.value {
        background: #2a2a2a;
        font-family: "Courier New", monospace;
      }

      td.value.active {
        background: #1a4d2e;
        color: #4ade80;
        font-weight: 600;
      }

      .empty-scene {
        padding: 40px;
        text-align: center;
        color: #666;
        font-style: italic;
      }

      .error {
        background: #4a1a1a;
        color: #ff6b6b;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 20px;
      }

      .scanner-header {
        background: #444;
        cursor: pointer;
        user-select: none;
        transition: background 0.2s;
        min-width: 40px;
        max-width: 40px;
        width: 40px;
        padding: 8px 4px;
        font-weight: bold;
        font-size: 0.9em;
      }

      .scanner-header:hover {
        background: #555;
      }

      .scanner-header.selected {
        background: #2a5a8a;
      }

      .copy-controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #444;
      }

      .copy-section {
        background: #333;
        padding: 6px 8px;
        border-radius: 4px;
      }

      .copy-section h3 {
        font-size: 0.8em;
        color: #4a9eff;
        margin-bottom: 4px;
      }

      .copy-row {
        display: flex;
        gap: 4px;
        align-items: center;
      }

      .copy-row label {
        font-size: 0.75em;
        color: #aaa;
        min-width: 35px;
      }

      .copy-row input {
        flex: 1;
        padding: 4px;
        background: #2a2a2a;
        color: #e0e0e0;
        border: 1px solid #4a4a4a;
        border-radius: 3px;
        font-size: 0.8em;
      }

      .copy-row button {
        padding: 4px 8px;
        background: #4a9eff;
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 0.75em;
        font-weight: 600;
      }

      .copy-row button:hover {
        background: #3a8eef;
      }

      .copy-row button:active {
        background: #2a7edf;
      }

      .slider-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 5px;
        gap: 3px;
      }

      .slider-value {
        font-family: "Courier New", monospace;
        font-size: 0.85em;
        font-weight: 600;
        color: #888;
        min-width: 30px;
        text-align: center;
      }

      .slider-value.active {
        color: #4ade80;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 3px;
        background: #3a3a3a;
        outline: none;
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #4a9eff;
        cursor: pointer;
      }

      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #4a9eff;
        cursor: pointer;
        border: none;
      }

      input[type="range"].active {
        background: linear-gradient(
          to right,
          #1a4d2e 0%,
          #1a4d2e var(--value),
          #3a3a3a var(--value),
          #3a3a3a 100%
        );
      }

      input[type="range"].active::-webkit-slider-thumb {
        background: #4ade80;
      }

      input[type="range"].active::-moz-range-thumb {
        background: #4ade80;
      }

      .action-buttons {
        display: flex;
        gap: 8px;
        margin-top: 6px;
        justify-content: flex-end;
      }

      .action-buttons button {
        padding: 5px 12px;
        background: #3a3a3a;
        color: #e0e0e0;
        border: 1px solid #4a4a4a;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8em;
      }

      .action-buttons button:hover {
        background: #4a4a4a;
      }

      .action-buttons button.primary {
        background: #4a9eff;
        border-color: #4a9eff;
      }

      .action-buttons button.primary:hover {
        background: #3a8eef;
      }

      .empty-indicator {
        color: #ff6b6b;
        font-size: 0.85em;
        font-style: italic;
      }

      .attr-select {
        cursor: pointer;
        font-weight: 600;
        text-align: center;
      }

      .attr-select:focus {
        outline: 2px solid #4a9eff;
      }

      .channel-label span {
        display: block;
        margin-top: 2px;
        font-weight: normal;
      }

      /* 2D Pan/Tilt Pad */
      .pantilt-cell {
        width: 60px;
        min-width: 60px;
        max-width: 60px;
        height: 70px;
        padding: 4px;
        position: relative;
      }

      .pantilt-pad {
        width: 50px;
        height: 50px;
        background: #2a2a2a;
        border: 2px solid #4a4a4a;
        border-radius: 4px;
        position: relative;
        cursor: crosshair;
        margin: 0 auto;
      }

      /* Invisible hover zone keeps hover stable while overlay expands */
      .pantilt-pad::after {
        content: "";
        position: absolute;
        inset: -10px;
        z-index: 999;
        display: none;
      }

      .pantilt-pad:hover::after {
        display: block;
      }

      /* Expanded overlay on hover — does not affect table layout */
      .pantilt-pad-overlay {
        display: none;
        position: absolute;
        width: 200px;
        height: 200px;
        background: #2a2a2a;
        border: 2px solid #4a9eff;
        border-radius: 4px;
        cursor: crosshair;
        z-index: 1000;
        right: 4px;
        top: 50%;
        transform: translateY(-50%);
      }

      .pantilt-pad:hover ~ .pantilt-pad-overlay,
      .pantilt-pad-overlay:hover {
        display: block;
      }

      .pantilt-crosshair {
        position: absolute;
        width: 1px;
        height: 100%;
        background: #666;
        left: 50%;
        top: 0;
      }

      .pantilt-crosshair.horizontal {
        width: 100%;
        height: 1px;
        left: 0;
        top: 50%;
      }

      .pantilt-position {
        position: absolute;
        width: 10px;
        height: 10px;
        background: #4a9eff;
        border: 2px solid #fff;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .pantilt-pad-overlay .pantilt-position {
        width: 14px;
        height: 14px;
        background: #4ade80;
      }

      .pantilt-label {
        font-size: 0.7em;
        color: #888;
        margin-top: 2px;
        text-align: center;
      }

      /* Preset Dropdown */
      .preset-dropdown {
        width: 100%;
        padding: 4px;
        background: #3a3a3a;
        color: #e0e0e0;
        border: 1px solid #4a4a4a;
        border-radius: 3px;
        font-size: 0.8em;
        cursor: pointer;
        text-align: center;
      }

      .preset-dropdown:hover {
        border-color: #4a9eff;
      }

      .preset-dropdown:focus {
        outline: 2px solid #4a9eff;
        border-color: #4a9eff;
      }

      .preset-dropdown.active {
        background: #1a4d2e;
        color: #4ade80;
        border-color: #4ade80;
      }

      /* Scene navigation bar */
      .scene-bar {
        display: flex;
        gap: 4px;
        margin-bottom: 8px;
      }

      .scene-bar-item {
        flex: 1;
        padding: 6px 0;
        text-align: center;
        background: #333;
        border: 1px solid #444;
        border-radius: 4px;
        font-size: 0.8em;
        font-weight: 600;
        color: #888;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
      }

      .scene-bar-item:hover {
        background: #444;
        color: #ccc;
      }

      .scene-bar-item.active {
        background: #4a9eff;
        border-color: #4a9eff;
        color: #fff;
      }

      .scene-bar-item.has-data {
        color: #aaa;
        border-color: #555;
      }

      .scene-bar-item.has-data.active {
        background: #4a9eff;
        border-color: #4a9eff;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎭 Showlite DMX Master Pro - Scene Editor</h1>

      <div class="controls">
        <div class="file-input">
          <input type="file" id="fileInput" accept=".PRO,.pro" />
        </div>
        <div class="scene-info" id="sceneInfo">
          <h2 id="sceneTitle">Load a .PRO file to begin</h2>
          <div class="navigation-hint">
            ← → scenes (1-8) &nbsp;|&nbsp; ↑ ↓ banks
          </div>
        </div>
        <div class="copy-controls" id="copyControls" style="display: none">
          <div class="copy-section">
            <h3>📋 Copy Scene</h3>
            <div class="copy-row">
              <label>From:</label>
              <input
                type="number"
                id="copyFromScene"
                min="1"
                max="240"
                placeholder="Scene #"
              />
              <label>To:</label>
              <input
                type="number"
                id="copyToScene"
                min="1"
                max="240"
                placeholder="Scene #"
              />
              <button onclick="copyScene()">Copy</button>
            </div>
          </div>
          <div class="copy-section">
            <h3>🏦 Copy Bank</h3>
            <div class="copy-row">
              <label>From:</label>
              <input
                type="number"
                id="copyFromBank"
                min="1"
                max="30"
                placeholder="Bank #"
              />
              <label>To:</label>
              <input
                type="number"
                id="copyToBank"
                min="1"
                max="30"
                placeholder="Bank #"
              />
              <button onclick="copyBank()">Copy</button>
            </div>
          </div>
        </div>
        <div class="action-buttons" id="actionButtons" style="display: none">
          <button onclick="jumpToChannelConfig()">
            ⚙️ Enter Channel Config
          </button>
          <button onclick="jumpToCalibration()">
            📐 Enter Calibration Scenes
          </button>
          <button onclick="clearScene()">🗑️ Clear this Scene</button>
          <button onclick="clearBank()">🗑️ Clear this Bank</button>
          <button onclick="downloadFile()">💾 Download Modified .PRO</button>
        </div>
      </div>

      <div id="error"></div>

      <div class="scene-display" id="sceneDisplay">
        <div class="empty-scene">No scene loaded</div>
      </div>
    </div>

    <script src="viewer.js"></script>
  </body>
</html>
